<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Modern To-Do</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Tasks</h1>
            <div class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </div>
        </header>

        <form id="todo-form">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required aria-label="New Task">
                <button type="submit" class="btn-add" aria-label="Add Task"><i class="fas fa-plus"></i></button>
            </div>
        </form>

        <div class="filters" id="filters" aria-label="Filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul class="todo-list" id="todo-list" aria-label="Task List">
            <!-- Tasks will be injected here dynamically -->
        </ul>

        <div class="app-footer">
            <span class="items-left" id="items-left">0 items left</span>
            <button class="clear-completed" id="clear-completed">Clear Completed</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
